# Unknown Host headers are rejected instead of reaching the personal site.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

# ACME challenges stay available on HTTP; all public hosts otherwise converge
# on the single canonical HTTPS origin.
server {
    listen 80;
    listen [::]:80;
    server_name ailiuxu.com www.ailiuxu.com liuxu.wiki www.liuxu.wiki;

    server_tokens off;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/acme;
        try_files $uri =404;
    }

    location / {
        return 301 https://ailiuxu.com$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/ssl/personal-site/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/personal-site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 444;
}

# Secondary domains and www variants are aliases, never duplicate sites.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.ailiuxu.com liuxu.wiki www.liuxu.wiki;

    server_tokens off;
    ssl_certificate /etc/nginx/ssl/personal-site/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/personal-site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:personal_site_tls:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    return 301 https://ailiuxu.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ailiuxu.com;

    server_tokens off;
    root /var/www/personal-site/current;
    index index.html;

    ssl_certificate /etc/nginx/ssl/personal-site/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/personal-site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:personal_site_tls:10m;
    ssl_session_timeout 1d;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    # Child locations add cache headers. Merge keeps the security headers below.
    add_header_inherit merge;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'none'; upgrade-insecure-requests" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # HTML and metadata should be revalidated so corrections replace old facts quickly.
    expires -1;

    location / {
        try_files $uri $uri/ =404;
    }

    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /og.png {
        expires 7d;
        try_files $uri =404;
    }

    location = /beian-icon.png {
        expires 7d;
        try_files $uri =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
