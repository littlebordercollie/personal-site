server {
    listen 80;
    listen [::]:80;

    server_name
        ailiuxu.com
        www.ailiuxu.com
        liuxu.wiki
        www.liuxu.wiki;

    root /var/www/personal-site;

    location ^~ /.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name
        ailiuxu.com
        www.ailiuxu.com
        liuxu.wiki
        www.liuxu.wiki;

    root /var/www/personal-site;
    index index.html;

    ssl_certificate /etc/nginx/ssl/personal-site/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/personal-site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:personal_site_tls:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}
